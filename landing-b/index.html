<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Club Pádel 04 · Landing B</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #050914, #101827 55%, #172554);
      color: white;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      max-width: 900px;
      background: #101827;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0,0,0,.35);
    }

    h1 {
      font-size: 48px;
      margin: 12px 0 16px;
      line-height: 1;
    }

    p {
      color: #b7c2d6;
      font-size: 18px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 24px;
    }

    a {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 60px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 900;
      color: #06121f;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
    }

    a.secondary {
      background: #17243a;
      color: white;
      border: 1px solid rgba(255,255,255,.14);
    }

    @media(max-width:720px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 38px; }
    }
  </style>
</head>
<body>
  <main>
    <p><strong>Club Pádel 04 · Landing B</strong></p>
    <h1>Versión alternativa</h1>
    <p>Página pública alternativa para comparar diseño, textos y experiencia de usuario frente a la Landing A.</p>

    <div class="grid">
      <a href="../landing-a/">Abrir Landing A</a>
      <a class="secondary" href="../">Volver al inicio</a>
    </div>
  </main>
</body>
</html>
